# Cresus Performance Analyzer Skill
# Analyze and report on portfolio performance metrics

skill_name: "performance_analyzer"
description: "Analyze Cresus portfolio performance with detailed metrics and comparisons"
version: "1.0.0"
category: "finance"

triggers:
  - "performance"
  - "analysis"
  - "returns"
  - "sharpe"
  - "drawdown"
  - "profit"
  - "loss"

# Hermes-invocable tools
tools:

  - name: "cresus_performance_compare"
    description: "Compare performance metrics across multiple portfolios"
    category: "performance_analysis"
    command: "{{skill_dir}}/run_tool.sh compare {{portfolio1}} {{portfolio2}}"
    output_format: "json"
    parameters:
      - name: "portfolio1"
        type: "string"
        description: "First portfolio name"
        required: true
        examples: ["PEA", "BNP", "test"]
      - name: "portfolio2"
        type: "string"
        description: "Second portfolio name"
        required: true
        examples: ["PEA", "BNP", "test"]
    example:
      user: "Compare PEA and BNP performance"
      tool_call: "cresus_performance_compare"
      params: { "portfolio1": "PEA", "portfolio2": "BNP" }
      result: "Side-by-side comparison of metrics"

  - name: "cresus_performance_summary"
    description: "Get a comprehensive performance summary for a portfolio"
    category: "performance_analysis"
    command: "{{skill_dir}}/run_tool.sh summary {{portfolio}}"
    output_format: "json"
    parameters:
      - name: "portfolio"
        type: "string"
        description: "Portfolio name"
        required: true
        examples: ["PEA", "BNP", "test"]
    example:
      user: "Summarize PEA performance"
      tool_call: "cresus_performance_summary"
      params: { "portfolio": "PEA" }
      result: "Complete performance overview with key metrics"

examples:
  "compare PEA and BNP": "Use cresus_performance_compare with portfolio1=PEA, portfolio2=BNP"
  "analyze PEA performance": "Use cresus_performance_summary with portfolio=PEA"

instructions: |
  ## Performance Analyzer Tools

  Analyze portfolio performance with detailed metrics and comparisons.

  **Tools:**
  1. **cresus_performance_compare** - Compare two portfolios side-by-side
  2. **cresus_performance_summary** - Get comprehensive performance overview

  **Available Portfolios:**
  - PEA (French tax-advantaged account)
  - BNP (BNP Paribas real portfolio)
  - test (Test portfolio)
  - _global (Global paper portfolio)
  - etf_pea_trend, cac_trend, nasdaq_100_trend (Strategy portfolios)
