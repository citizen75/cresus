name: cac_momentum
universe: cac40
description: Momentum strategy on CAC40 stocks - trend following with momentum confirmation
  and extension control
engine: TaModel
indicators:
- atr_14
- rsi_9
- ema_10
- ema_20
- adx_20
- macd_12_26
watchlist:
  enabled: true
  parameters:
    tickers:
      max_count: 15
      description: Reduced to top 15 to improve selectivity and avoid overtrading
    volume:
      min_volume: 500000
      description: Minimum daily trading volume for inclusion in watchlist
    ranking:
      metric: score
      description: Metric used to rank and sort tickers in the watchlist
    trend:
      formula: close[0] > ema_10[0] and ema_10[0] > ema_20[0] and adx_20[0] > 25 and
        ((ema_10[0] - ema_20[0]) / ema_20[0]) > 0.005
      description: 'Improved trend detection: price > EMA10 > EMA20, ADX > 25 and
        EMA gap > 0.5% ensures real trend structure'
    volatility:
      formula: atr_14[0] > close[0] * 0.012
      description: 'Volatility filter: ATR > 1.2% of price ensures sufficient expansion
        potential'
signals:
  enabled: true
  weights:
    momentum: 0.5
    trend: 0.35
    volume_anomaly: 0.15
    mean_reversion: 0.0
  parameters:
    momentum:
      formula: macd_12_26[0] > 0.5 and rsi_9[0] > 60 and rsi_9[0] < 80
      description: 'Momentum signal: MACD strength > 0.5 with RSI in 60-80 range confirms
        sustainable bullish momentum (avoids weak or extreme conditions)'
    trend:
      formula: close[0] > ema_10[0] and ema_10[0] > ema_20[0] and adx_20[0] > 25
      description: 'Trend signal: Strong uptrend confirmed with ADX > 25 (filters
        weak trend environments)'
    mean_reversion:
      formula: 'False'
      description: Mean reversion disabled - momentum strategy is trend-following
        not counter-trend
    volume_anomaly:
      formula: volume[0] > 1000000
      description: 'Volume anomaly signal: Volume > 1M shares indicates strong participation'
entry:
  enabled: true
  parameters:
    max_daily_orders:
      formula: 2
      description: Maximum orders (buys) allowed per day to match watchlist size
    position_size:
      formula: 1000 / close[0]
      description: Fixed capital allocation per trade
    extension_filter:
      formula: (close[0] - ema_10[0]) / ema_10[0] < 0.05
      description: Avoid entries when price is more than 5% above EMA10 (prevents
        chasing extended moves)
    limit_price:
      formula: close[0] * 0.99
      description: Use limit orders at 1% below current price to improve entries (reduces
        slippage and avoids chasing)
    regime_filter:
      formula: close[0] > ema_20[0] and adx_20[0] > 20
      description: Trade only when market regime is trending (reduces losses in choppy
        conditions)
    entry_filter:
      formula: close[0] > ema_20[0]
      description: Entry condition filter
    order_type:
      formula: market
      description: Order type for entry (market or limit)
exit:
  enabled: true
  parameters:
    take_profit:
      formula: close[0] + atr_14[0] * 2.6
      description: Target at 2.6 ATR maintains ~2:1 reward/risk and aligns with realistic
        swing move potential
    holding_period:
      formula: 12
      description: Maximum holding period of 12 trading days aligned with momentum
        decay cycle
    time_stop:
      formula: 1
      description: Cancel unfilled entry orders after 1 day (separates execution logic
        from holding logic)
    stop:
      type: trailing
      formula: close[0] - atr_14[0] * 1.3
      description: Trailing stop at 1.3x ATR below current price (volatility-adjusted,
        moves up as price rises)
backtest:
  initial_capital: 10000
