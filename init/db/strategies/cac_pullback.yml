name: cac_pullback
description: CAC40 Pullback Trading Strategy
source: cac40
universe: cac40
indicators:
- ema_20
- ema_50
- rsi_14
- adx_14
entry:
  enabled: true
  parameters:
    position_size:
      formula: 1000 / close[0]
      description: "Fixed capital allocation of \u20AC1000 per trade"
    entry_filter:
      formula: close[0] > ema_20[0]
      description: Entry condition filter
    order_type:
      formula: market
      description: Order type for entry (market or limit)
exit:
  enabled: true
  parameters:
    take_profit:
      formula: close[0] * 1.08
      description: Take profit at 8% above entry
    holding_period:
      formula: 30
      description: Exit after 30 days maximum
    stop:
      type: trailing
      formula: close[0] * 0.95
      description: Trailing stop at 5% below current price (moves up as price rises)
backtest:
  initial_capital: 10000
  commission: 0.0
