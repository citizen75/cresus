name: etf_pea_trend
universe: cac40_etf
description: "Trend-following strategy for CAC40 ETFs with fixed \u20AC1500 position\
  \ sizing"
engine: TaModel
indicators:
- atr_14
- rsi_14
- ema_20
- ema_50
- adx_14
- adx_20
- macd_12_26
- sha_10
- sha_10_red
- sha_10_green
watchlist:
  enabled: true
  parameters:
    tickers:
      max_count: 10
      description: Maximum 10 ETFs to track for trend-following
    volume:
      min_volume: 1000000
      description: Minimum daily trading volume for ETF inclusion
    ranking:
      metric: score
      description: Rank ETFs by trend strength
    trend:
      formula: sha_10_green[0] == 1 and adx_14[0] > 25
      description: Trend detection using sustained green signal with strong ADX
    volatility:
      formula: atr_14[0] > close[0] * 0.015
      description: 'Volatility filter: ATR > 1.5% of price ensures adequate movement'
signals:
  enabled: true
  weights:
    momentum: 0.4
    trend: 0.5
    volume_anomaly: 0.1
    mean_reversion: 0.0
  parameters:
    momentum:
      formula: macd_12_26[0] > 0 and rsi_14[0] > 50 and rsi_14[0] < 80
      description: 'Momentum signal: MACD positive with RSI in bullish zone (50-80)'
    trend:
      formula: close[0] > ema_20[0] and ema_20[0] > ema_50[0] and adx_20[0] > 25
      description: 'Trend signal: Strong uptrend confirmation with ADX > 25'
    mean_reversion:
      formula: 'False'
      description: Mean reversion disabled for pure trend-following
    volume_anomaly:
      formula: volume[0] > 2000000
      description: 'Volume anomaly: Volume > 2M indicates strong participation'
entry:
  enabled: true
  parameters:
    position_size:
      formula: 1500 / close[0]
      description: "Fixed capital allocation of \u20AC1500 per ETF position (consistent\
        \ sizing)"
    max_daily_orders:
      formula: 3
      description: Maximum 3 buys per day to limit daily allocation
    entry_filter:
      formula: sha_10_green[0] == 1 and sha_10_green[-1] == 1 and sha_10_red[-2] == 1 and adx_14[0] > 25
      description: Entry on sustained green signal with recent red reversal and strong trend
    order_type:
      formula: market
      description: Order type for entry execution
exit:
  enabled: true
  parameters:
    stop:
      type: trailing
      formula: close[0] * 0.97
      description: Trailing stop at 3% below highest price reached during holding
        period
    take_profit:
      formula: close[0] * 1.08
      description: Take profit at 8% above entry
    holding_period:
      formula: 60
      description: Exit after 60 days maximum holding period
