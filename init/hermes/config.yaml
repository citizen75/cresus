# Hermes Configuration for Cresus Integration
# Optimized for local Ollama with Cresus portfolio management

model:
  default: qwen3.5:9b
  provider: custom
  base_url: http://192.168.0.160:11434/v1
  api_key: ollama
  max_tokens: 16384
  context_window: 32768
  context_length: 65536
  top_k: 20
  top_p: 0.95
  temperature: 0.2
  api_mode: chat_completions

# Cresus Integration
api:
  base_url: http://192.168.0.130:6501/api/v1
  timeout: 30
  retry_count: 3
  ssl_verify: true

# Skills configuration
skills:
  external_dirs:
  - ~/.hermes/skills
  template_vars: true
  enabled:
  - cresus/portfolio_manager
  - cresus/screener_analyzer
  - cresus/performance_analyzer
  disabled: []

# Agent configuration
agent:
  max_turns: 60
  tool_use_enforcement: auto
  enable_tools: true
  allow_mcp_tools: true

# Prompts
prompts:
  system: /Users/gsamoun/.hermes/config/system_prompt.md

# Display settings
display:
  compact: false
  streaming: true
  show_reasoning: false

# Tools configuration
tools:
  enabled: true
  timeout: 30
  max_retries: 3

# Logging
logging:
  level: INFO
  file: ~/.hermes/logs/cresus.log
