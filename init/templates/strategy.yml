# Strategy Configuration Template
# All strategies must follow this structure

name: strategy_name
universe: cac40  # Data source: cac40, srd, enx_large, nasdaq_100, etf_pea, etc.
description: Brief description of strategy objectives and logic

# Technical indicators to calculate and make available to formulas
indicators:
  - atr_14
  - rsi_9
  - ema_10
  - ema_20
  - adx_14
  - adx_20
  - macd_12_26

# Watchlist configuration - which tickers to trade
watchlist:
  enabled: true
  parameters:
    tickers:
      max_count: 15
      description: Maximum number of tickers in the watchlist
    volume:
      min_volume: 500000
      description: Minimum daily trading volume for inclusion
    ranking:
      metric: score
      description: Metric to rank tickers (score, gain, etc.)
    trend:
      formula: close[0] > ema_10[0] && ema_10[0] > ema_20[0]
      description: Formula to filter tickers - include only if True
    volatility:
      formula: atr_14[0] > close[0] * 0.012
      description: Volatility filter formula

features:
  enabled: true
  # Feature engineering configuration - which features to calculate for entry model

  alphas:
    # Momentum alphas - capture trend strength
    momentum:
      - roc_5              # 5-day rate of change %
      - roc_10             # 10-day rate of change %
      - roc_20             # 20-day momentum
      - roc_60             # 60-day momentum
      - roc_120            # 120-day momentum
      - roc_250            # 250-day momentum (annual)
      - roc_20 - roc_250   # Medium-term vs long-term momentum
      - ema_10 - ema_20    # EMA momentum spread
      - macd_12_26_cross   # MACD crossover signal
      - rsi_14             # Relative strength index
      - close[0] > ema_10[0]  # Price above short EMA
      - close[0] > ema_20[0]  # Price above medium EMA
      - ema_10[0] > ema_20[0] # Short above medium EMA

    # Mean reversion alphas - capture overbought/oversold conditions
    mean_reversion:
      - -1*roc_1           # Reversal from 1-day move
      - -1*roc_5           # Reversal from 5-day move
      - -1*roc_10          # Reversal from 10-day move
      - rsi_14 < 30        # RSI oversold condition
      - rsi_14 > 70        # RSI overbought condition
      - close[0] < ema_20[0]  # Price below medium EMA (mean reversion)

    # Volatility alphas - capture volatility expansion/contraction
    volatility:
      - atr_14             # Average true range
      - atr_14 / close[0]  # Volatility as % of price
      - volume[0] / volume_sma_20[0]  # Volume expansion
      - bb_20_upper[0] - bb_20_lower[0]  # Bollinger band width
      - (close[0] - bb_20_lower[0]) / (bb_20_upper[0] - bb_20_lower[0])  # %B Bollinger position

    # Trend quality alphas - capture trend strength and direction
    trend:
      - adx_14             # ADX trend strength
      - adx_20             # ADX-20 trend strength
      - close[0] - sma_50[0]  # Price vs 50-day MA
      - (close[0] - sma_200[0]) / close[0]  # Price deviation from 200-day MA
      - sma_20[0] - sma_50[0]  # Short MA vs medium MA

    # Cross-asset correlation alphas
    correlations:
      - volume[0] / volume[20]  # Volume trend
      - high[0] - low[0]        # Intrabar range
      - (high[0] - close[0]) / (high[0] - low[0])  # Upper wick size
      - (close[0] - low[0]) / (high[0] - low[0])   # Lower wick size

# Signal generation configuration
signals:
  enabled: true
  weights:
    momentum: 0.5
    trend: 0.35
    volume_anomaly: 0.15
    mean_reversion: 0.0
  parameters:
    momentum:
      formula: macd_12_26[0] > 0.5
      description: Momentum signal formula
    trend:
      formula: close[0] > ema_10[0] && ema_10[0] > ema_20[0]
      description: Trend signal formula
    mean_reversion:
      formula: 'False'  # Set to 'False' to disable signal
      description: Mean reversion signal formula
    volume_anomaly:
      formula: volume[0] > 1000000
      description: Volume anomaly signal formula

# Entry configuration - when and how to enter trades
entry:
  enabled: true
  parameters:
    max_daily_orders:
      formula: 2
      description: Maximum buy orders allowed per day
    position_size:
      formula: 1000 / close[0]
      description: Number of shares to buy (can use formulas)
    score_filter:
      min: 60
      description: Only enter positions with a composite score above 60 to ensure strong trend
    entry_filter:
      formula: close[0] > ema_20[0] && adx_14[0] > 20
      description: Market condition filter - entries only when True
    order_type:
      formula: limit
      description: "limit or market - determines how entry orders are executed"
    limit_price:
      formula: close[0] * 0.99
      description: Limit order price (only used if order_type is limit)

order:
  enabled: true
  parameters:
    position_sizing:
      formula: 2000 / close[0]
      description: Fixed €2,000 per position
    max_daily_orders:
      formula: 2
      description: Allow up to 3 orders per day
    max_positions:
      formula: 5
      description: 5 positions max at any time
    fees:
      formula: 0.001
      description: Estimated fees as a percentage of trade value
    slippage:
      formula: 0.001
      description: Estimated slippage as a percentage of trade value
    
# Exit configuration - how to close positions
exit:
  enabled: true
  parameters:
    stop:
      type: fix  # fix (static price) or trailing (dynamic, follows peak)
      formula: close[0] - atr_14[0] * 1.3
      description: Stop loss level - required for risk management
    take_profit:
      formula: close[0] + atr_14[0] * 2.6
      description: Take profit target (set to 'False' to disable)
    holding_period:
      formula: 12
      description: Maximum holding period in days
    time_stop:
      formula: 1
      description: Cancel unfilled entry orders after N days
    condition:
      formula: 'False'
      description: Exit condition formula - SELL when True (e.g., sha_10_red[0] == 1)

# Backtest configuration
backtest:
  initial_capital: 10000
  description: Starting capital for backtesting
