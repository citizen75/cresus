skill_name: "portfolio_manager"
description: "Cresus portfolio manager - get positions, metrics, and performance"
version: "6.0.0"
category: "finance"

triggers:
  - "portfolio"
  - "positions"
  - "show.*position"
  - "PEA"
  - "BNP"

tools:
  - name: "get_pea_positions"
    description: "Get all positions in PEA portfolio"
    command: "cresus-mcp portfolio positions PEA"
    output_format: "json"

  - name: "get_bnp_positions"
    description: "Get all positions in BNP portfolio"
    command: "cresus-mcp portfolio positions BNP"
    output_format: "json"

  - name: "list_all_portfolios"
    description: "List all available portfolios"
    command: "cresus-mcp portfolio list"
    output_format: "json"
