# Cresus Portfolio Manager Skill for Hermes Agent
# Invocable actions for portfolio management via cresus-mcp CLI

skill_name: "portfolio_manager"
description: "Query Cresus portfolio data - positions, metrics, performance, allocation, value"
version: "4.0.0"
category: "finance"

triggers:
  - "portfolio"
  - "positions"
  - "metrics"
  - "performance"
  - "allocation"
  - "holdings"
  - "PEA"
  - "BNP"
  - "cresus"
  - "show.*position"
  - "get.*position"

# Executable actions via terminal
actions:

  - name: "list_portfolios"
    description: "List all available portfolios in Cresus"
    command: "cresus portfolio list --mcp"
    output_format: "json"
    parameters: []

  - name: "get_portfolio_positions"
    description: "Get all positions in a specific portfolio"
    command: "cresus portfolio positions {{portfolio}} --mcp"
    output_format: "json"
    parameters:
      - name: "portfolio"
        type: "string"
        description: "Portfolio name (PEA, BNP, test, _global, etf_pea_trend, cac_trend, nasdaq_100_trend)"
        required: true

  - name: "get_portfolio_metrics"
    description: "Get performance metrics for a portfolio"
    command: "cresus portfolio metrics {{portfolio}} --mcp"
    output_format: "json"
    parameters:
      - name: "portfolio"
        type: "string"
        description: "Portfolio name"
        required: true

  - name: "get_portfolio_performance"
    description: "Get historical performance data for a portfolio"
    command: "cresus portfolio performance {{portfolio}} --mcp"
    output_format: "json"
    parameters:
      - name: "portfolio"
        type: "string"
        description: "Portfolio name"
        required: true

  - name: "get_portfolio_allocation"
    description: "Get portfolio asset allocation breakdown"
    command: "cresus portfolio allocation {{portfolio}} --mcp"
    output_format: "json"
    parameters:
      - name: "portfolio"
        type: "string"
        description: "Portfolio name"
        required: true

  - name: "get_portfolio_value"
    description: "Get total portfolio value and cash position"
    command: "cresus portfolio value {{portfolio}} --mcp"
    output_format: "json"
    parameters:
      - name: "portfolio"
        type: "string"
        description: "Portfolio name"
        required: true

# Available portfolios
portfolios:
  - PEA
  - BNP
  - test
  - _global
  - etf_pea_trend
  - cac_trend
  - nasdaq_100_trend

# Usage examples
examples:
  "list all portfolios": "Use list_portfolios action"
  "show PEA positions": "Use get_portfolio_positions with portfolio=PEA"
  "get BNP metrics": "Use get_portfolio_metrics with portfolio=BNP"
  "show PEA performance": "Use get_portfolio_performance with portfolio=PEA"
  "show PEA allocation": "Use get_portfolio_allocation with portfolio=PEA"
  "what's the value of BNP": "Use get_portfolio_value with portfolio=BNP"

instructions: |
  Query Cresus portfolios for real-time data via the cresus-mcp CLI tool.

  Available actions:
  - list_portfolios - List all portfolios
  - get_portfolio_positions - Get positions in a portfolio
  - get_portfolio_metrics - Get metrics
  - get_portfolio_performance - Get performance history
  - get_portfolio_allocation - Get allocation
  - get_portfolio_value - Get portfolio value
