# Cron job configuration for Cresus Gateway
# Each job can call an agent or flow with parameters

jobs:
  # Example: Run premarket flow daily at 8:00 AM on weekdays
  - name: premarket_daily
    description: "Run premarket analysis for momentum strategy"
    enabled: false  # Set to true to enable
    schedule: "0 8 * * 1-5"  # 8:00 AM, Monday-Friday (cron format)
    type: flow  # 'flow' or 'agent'
    target: premarket  # Flow or agent name
    params:
      strategy: momentum_cac

  # Example: Run strategy agent hourly
  - name: strategy_hourly
    description: "Run strategy agent every hour"
    enabled: false
    schedule: "0 * * * *"  # Every hour
    type: agent
    target: strategy
    params:
      strategy: momentum_etf_fr

  # Heartbeat every 5 minutes
  - name: heartbeat
    description: "Gateway heartbeat - logs INFO message every 5 minutes"
    enabled: true
    schedule: "*/5 * * * *"  # Every 5 minutes
    type: flow
    target: heartbeat
    params: {}

  # Data sync every 30 minutes during market hours
  - name: data_sync_cac40
    description: "Sync CAC40 market data every 30 minutes (9:00-18:30, weekdays)"
    enabled: true
    schedule: "*/30 9-18 * * 1-5"  # Every 30 minutes, hours 9-18, Monday-Friday
    type: flow
    target: data_fetch
    params:
      universe: cac40


    # Data sync every 30 minutes during market hours
  - name: data_sync_index
    description: "Sync index market data every 30 minutes (9:00-18:30, weekdays)"
    enabled: true
    schedule: "*/30 * * * 1-5"  # Every 30 minutes, hours 9-18, Monday-Friday
    type: flow
    target: data_fetch
    params:
      universe: index
