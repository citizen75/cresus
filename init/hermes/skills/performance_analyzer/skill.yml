# Cresus Performance Analyzer Skill
# Analyze and report on portfolio performance metrics

skill_name: "performance_analyzer"
description: "Analyze Cresus portfolio performance with detailed metrics and comparisons"
version: "1.0.0"
category: "finance"

triggers:
  - "performance"
  - "analysis"
  - "returns"
  - "sharpe"
  - "drawdown"
  - "profit"
  - "loss"

# Hermes-invocable tools
tools:

  - name: "cresus_performance_compare"
    description: "Compare performance metrics across multiple portfolios"
    category: "performance_analysis"
    command: "cresus-mcp portfolio metrics {{portfolio1}} && cresus-mcp portfolio metrics {{portfolio2}}"
    output_format: "json"
    parameters:
      - name: "portfolio1"
        type: "string"
        description: "First portfolio name"
        required: true
        examples: ["PEA", "BNP", "test"]
      - name: "portfolio2"
        type: "string"
        description: "Second portfolio name"
        required: true
        examples: ["PEA", "BNP", "test"]
    example:
      user: "Compare PEA and BNP performance"
      tool_call: "cresus_performance_compare"
      params: { "portfolio1": "PEA", "portfolio2": "BNP" }
      result: "Side-by-side comparison of metrics"

  - name: "cresus_performance_summary"
    description: "Get a comprehensive performance summary for a portfolio"
    category: "performance_analysis"
    command: "cresus-mcp portfolio metrics {{portfolio}}"
    output_format: "json"
    parameters:
      - name: "portfolio"
        type: "string"
        description: "Portfolio name"
        required: true
        examples: ["PEA", "BNP", "test"]
    example:
      user: "Summarize PEA performance"
      tool_call: "cresus_performance_summary"
      params: { "portfolio": "PEA" }
      result: "Complete performance overview with key metrics"

# Metrics reference
metrics:
  risk_metrics:
    sharpe_ratio:
      description: "Risk-adjusted returns (higher = better)"
      benchmark: 1.0
    sortino_ratio:
      description: "Downside-risk-adjusted returns"
      benchmark: 1.5
    max_drawdown:
      description: "Largest peak-to-trough decline"
      benchmark: -0.20
    volatility:
      description: "Portfolio return volatility"
      benchmark: 0.15

  return_metrics:
    total_return:
      description: "Cumulative return %"
    annual_return:
      description: "Annualized return %"
    monthly_return:
      description: "Average monthly return %"

  trade_metrics:
    win_rate:
      description: "Percentage of winning trades"
      benchmark: 0.50
    profit_factor:
      description: "Gross profit / Gross loss"
      benchmark: 1.5
    total_trades:
      description: "Number of trades executed"

# Analysis templates
analysis_templates:
  quick_summary: |
    **Portfolio Performance Summary**
    - Total Return: {{total_return}}%
    - Sharpe Ratio: {{sharpe_ratio}}
    - Max Drawdown: {{max_drawdown}}%
    - Win Rate: {{win_rate}}%

  detailed_analysis: |
    **Comprehensive Portfolio Analysis**

    **Risk Metrics:**
    - Sharpe Ratio: {{sharpe}} (benchmark: 1.0)
    - Sortino Ratio: {{sortino}} (benchmark: 1.5)
    - Max Drawdown: {{max_drawdown}}% (target: > -20%)
    - Volatility: {{volatility}}% (benchmark: 15%)

    **Return Metrics:**
    - Total Return: {{total_return}}%
    - Annual Return: {{annual_return}}%
    - Win Rate: {{win_rate}}%

    **Recommendations:**
    {{recommendations}}

# Performance thresholds
thresholds:
  excellent:
    sharpe: 2.0
    drawdown: -0.10
    win_rate: 0.65

  good:
    sharpe: 1.5
    drawdown: -0.15
    win_rate: 0.55

  acceptable:
    sharpe: 1.0
    drawdown: -0.20
    win_rate: 0.50

  poor:
    sharpe: 0.5
    drawdown: -0.30
    win_rate: 0.40

# Alerts
alerts:
  high_drawdown: "Portfolio drawdown {{drawdown}}% exceeds threshold"
  low_sharpe: "Sharpe ratio {{sharpe}} below target of 1.0"
  low_win_rate: "Win rate {{win_rate}}% is below 50%"
  volatility_spike: "Volatility increased to {{volatility}}%"
