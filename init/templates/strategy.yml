name: cac_top_5
description: Brief description of strategy objectives and logic
universe: cac40

watchlist:
  enabled: true
  parameters:
    filter:
      description: Formula to filter tickers - include only if True
      formula: volume[0] > 100000
    scoring:
      description: Composite score formula evaluated on latest data row (alpha + indicator columns)
      formula: ema_20_chgpct_5
    ranking:
      description: Metric to rank tickers (score, gain, etc.)
      metric: rank
    sorting:
      description: Sort order for ranking (asc or desc)
      order: desc
      column: score


entry:
  enabled: true
  parameters:
    entry_filter:
      description: Market condition filter - entries only when True
      formula: close[0] > ema_20[0] && adx_14[0] > 20
    limit_price:
      description: Limit order price (only used if order_type is limit)
      formula: close[0] * 0.99
    max_daily_orders:
      description: Maximum buy orders allowed per day
      formula: 2
    order_type:
      description: limit or market - determines how entry orders are executed
      type: limit
    position_size:
      description: Number of shares to buy (can use formulas)
      formula: 1000 / close[0]
    score_filter:
      description: Only enter positions with a composite score above 60 to ensure
        strong trend
      min: 60


exit:
  enabled: true
  parameters:
    condition:
      description: Exit condition formula - SELL when True (e.g., sha_10_red[0] ==
        1)
      formula: 'False'
    holding_period:
      description: Maximum holding period in days
      formula: 12
    stop:
      description: Stop loss level - required for risk management
      formula: close[0] - atr_14[0] * 1.3
      type: fix
    take_profit:
      description: Take profit target (set to 'False' to disable)
      formula: close[0] + atr_14[0] * 2.6
    time_stop:
      description: Cancel unfilled entry orders after N days
      formula: 1

order:
  enabled: true
  parameters:
    notify:
      enabled: true
    fees:
      description: Estimated fees as a percentage of trade value
      formula: 0.001
    max_daily_orders:
      description: Allow up to 3 orders per day
      formula: 2
    max_positions:
      description: 5 positions max at any time
      formula: 5
    position_sizing:
      description: "Fixed €2,000 per position"
      formula: 2000
      type: capital
    slippage:
      description: Estimated slippage as a percentage of trade value
      formula: 0.001

# Pulls in init/config/alphas.yml's shared indicators + alpha catalog (see
# tools/strategy/alphas.py: merge_shared_alphas). Add strategy-specific
# indicators/features.alphas alongside this flag if needed - anything declared
# here takes precedence over the shared catalog.
features:
  enabled: true
  shared_alphas: true

signals:
  enabled: true
  parameters:
    mean_reversion:
      description: Mean reversion signal formula
      formula: 'False'
    momentum:
      description: Momentum signal formula
      formula: macd_line[0] > macd_signal[0]
    trend:
      description: Trend signal formula
      formula: close[0] > ema_10[0] && ema_10[0] > ema_20[0]
    volume_anomaly:
      description: Volume anomaly signal formula
      formula: volume[0] > 1000000
  weights:
    mean_reversion: 0.0
    momentum: 0.5
    trend: 0.35
    volume_anomaly: 0.15
backtest:
  description: Starting capital for backtesting
  initial_capital: 10000
