name: cac_pullback
universe: cac40
description: Pullback strategy on CAC40 - mean reversion with support/resistance levels
engine: TaModel
indicators:
- rsi_14
- ema_20
- ema_50
- atr_14
- bollinger_bands_20_2
- adx_14
watchlist:
  enabled: true
  parameters:
    tickers:
      max_count: 20
      description: Top 20 pullback opportunities
    volume:
      min_volume: 300000
      description: Minimum daily trading volume
    ranking:
      metric: score
      description: Metric used to rank tickers
    oversold:
      formula: rsi_14[0] < 40 and close[0] < bollinger_bands_20_2_lower[0]
      description: Price below lower Bollinger Band with RSI < 40 indicates pullback
        setup
    support:
      formula: close[0] > ema_50[0] and (close[0] - ema_50[0]) / ema_50[0] < 0.02
      description: Price near 50-day EMA (within 2%) represents support level
signals:
  enabled: true
  weights:
    mean_reversion: 0.6
    trend: 0.2
    volume_anomaly: 0.2
    momentum: 0.0
  parameters:
    mean_reversion:
      formula: rsi_14[0] < 35 and close[0] < bollinger_bands_20_2_lower[0]
      description: Extreme oversold conditions suggest pullback reversal opportunity
    trend:
      formula: close[0] > ema_50[0] and adx_14[0] > 15
      description: Uptrend confirmation - enter only if above 50-day EMA
    volume_anomaly:
      formula: volume[0] > 500000
      description: Sufficient volume for support level validation
    momentum:
      formula: 'False'
      description: Momentum disabled for mean reversion strategy
entry:
  enabled: true
  parameters:
    position_size:
      formula: max(10, min(100, 1000 / close[0]))
      description: Position sizing between 10-100 shares based on price
    support_filter:
      formula: close[0] > ema_50[0]
      description: Only enter when price is above 50-day EMA (must be in uptrend)
    reversal_confirmation:
      formula: rsi_14[0] < 35
      description: RSI below 35 confirms oversold condition ready for reversal
    limit_price:
      formula: close[0] * 0.995
      description: Limit order at 0.5% below market
    max_daily_orders:
      formula: 5
      description: Limit orders per day to manage risk
exit:
  enabled: true
  parameters:
    stop_loss:
      formula: close[0] * 0.97
      description: Stop loss at 3% below entry
    take_profit:
      formula: close[0] + atr_14[0] * 2.0
      description: Target profit at 2 ATR above entry
    trailing_stop:
      formula: close[0] * 0.96
      description: Percentage-based trailing stop at 4% below entry protects pullback gains
    holding_period:
      formula: 8
      description: Maximum holding 8 days - pullback reversals are short-term
    time_stop:
      formula: 1
      description: Cancel unfilled orders after 1 day
backtest:
  initial_capital: 10000
