name: momentum_nasdaq
universe: nasdaq_100
description: Momentum strategy on Nasdaq100 stocks - trend following with momentum
  confirmation
engine: TaModel
indicators:
- atr_14
- rsi_9
- ema_10
- ema_20
- adx_20
- macd_12_26
entry:
  enabled: true
  parameters:
    position_size:
      formula: 1000 / close[0]
      description: Fixed capital allocation of €1000 per trade
exit:
  enabled: true
  parameters:
    stop_loss:
      formula: close[0] * 0.97
      description: Trailing stop at 3% below current price (moves up as price rises)
    take_profit:
      formula: close[0] * 1.05
      description: Take profit at 5% above entry
watchlist:
  enabled: true
  parameters:
    tickers:
      max_count: 20
      description: Maximum number of tickers to include in the watchlist based on
        liquidity and volatility filters
    volume:
      min_volume: 500000
      description: Minimum daily trading volume for inclusion in watchlist
    ranking:
      metric: score
      description: Metric used to rank and sort tickers in the watchlist
    trend:
      formula: close[0] > ema_10[0] and ema_10[0] > ema_20[0] and adx_20[0] > 20
      description: 'Trend detection: price > EMA10 > EMA20 AND ADX > 20 indicates
        strong trend'
    volatility:
      formula: atr_14[0] > close[0] * 0.01
      description: 'Volatility filter: ATR > 1% of price ensures meaningful trading
        range'
signals:
  enabled: true
  weights:
    momentum: 0.45
    trend: 0.4
    volume_anomaly: 0.15
    mean_reversion: 0.0
  parameters:
    momentum:
      formula: macd_12_26[0] > 0 and (rsi_9[0] < 30 or rsi_9[0] > 70)
      description: 'Momentum signal: MACD positive (uptrend) with RSI confirmation
        (oversold/overbought)'
    trend:
      formula: close[0] > ema_10[0] and ema_10[0] > ema_20[0] and adx_20[0] > 20
      description: 'Trend signal: Price > EMA10 > EMA20 with strong ADX confirms uptrend'
    mean_reversion:
      formula: 'False'
      description: Mean reversion disabled - momentum strategy is trend-following
        not counter-trend
    volume_anomaly:
      formula: volume[0] > 1000000
      description: 'Volume anomaly signal: Volume > 1M shares indicates good participation'
