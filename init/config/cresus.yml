servers:
  api:
    host: "${API_HOST:0.0.0.0}"     # Set via API_HOST env var
    port: "${API_PORT:8000}"         # Set via API_PORT env var
    log_file: "logs/api.log"
  gateway:
    cron_enabled: false              # Set to true to enable cron scheduler
    cron_config: "config/cron.yml"
    mcp_enabled: true                # Set to false to disable MCP server
  mcp:
    log_file: "logs/mcp.log"
  front:
    port: "${FRONT_PORT:5173}"       # Set via FRONT_PORT env var
    api_url: "${VITE_API_URL:http://localhost:8000}"  # Set via VITE_API_URL env var
    log_file: "logs/front.log"

db:
  portfolios_dir: "db/local/portfolios"
  cache_dir: "db/local/cache"
  orders_dir: "db/local/orders"
  history_dir: "db/local/history"

gsheet:
  credentials_path: "~/.config/cresus/gsheet_credentials.json"
  token_path: "~/.config/cresus/gsheet_token.json"
